<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galau Cinematic Aesthetic</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* --- General --- */
  body {
    margin: 0;
    padding: 0;
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  /* --- Gallery grid --- */
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    width: 90%;
    max-width: 1200px;
    margin-top: 50px;
    z-index: 1;
  }

  .gallery img {
    width: 100%;
    border-radius: 15px;
    transition: transform 0.5s, filter 0.5s;
    filter: brightness(0.8) drop-shadow(0 0 10px #ff0000);
  }

  .gallery img:hover {
    transform: scale(1.05);
    filter: brightness(1) drop-shadow(0 0 20px #ff4c4c);
  }

  /* --- Neon text --- */
  .neon-text {
    position: absolute;
    top: 20px;
    font-size: 2rem;
    text-align: center;
    width: 100%;
    color: #ff4c4c;
    text-shadow:
      0 0 5px #ff4c4c,
      0 0 10px #ff4c4c,
      0 0 20px #ff4c4c,
      0 0 40px #ff0000;
    animation: fadeText 5s infinite;
    pointer-events: none;
  }

  @keyframes fadeText {
    0%, 100% { opacity: 0; }
    10%, 90% { opacity: 1; }
  }

  /* --- Spotify player --- */
  .spotify-player {
    position: fixed;
    bottom: 20px;
    width: 320px;
    height: 80px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(255,0,0,0.5);
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
</style>
</head>
<body>

  <!-- Neon text -->
  <div id="neonContainer" class="neon-text"></div>

  <!-- Gallery -->
  <div class="gallery">
    <img src="motion_photo_7523844779172652385~2.jpg" alt="Foto 1">
    <img src="IMG_20260324_225639_424.jpg" alt="Foto 2">
    <img src="IMG_20260324_225639_382.jpg" alt="Foto 3">
    <img src="motion_photo_5823942349673579073.jpg" alt="Foto 4">
    <img src="motion_photo_7247671055954824122.jpg" alt="Foto 5">
    <img src="motion_photo_5808118521687866893~2.jpg" alt="Foto 6">
  </div>

  <!-- Spotify player -->
  <div class="spotify-player">
    <iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DX7qK8ma5wgG1?utm_source=generator" 
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
  </div>

  <script>
    const quotes = [
      "Aku rindu yang tak mungkin kembali...",
      "Hujan di kota ini mengingatkanku padamu...",
      "Sendiri lebih sakit dari yang ku kira...",
      "Kenanganmu masih membekas di hati...",
      "Aku tersesat dalam bayanganmu..."
    ];

    const container = document.getElementById("neonContainer");

    function showQuote() {
      container.textContent = quotes[Math.floor(Math.random() * quotes.length)];
    }

    showQuote();
    setInterval(showQuote, 5000);
  </script>

</body>
</html>
